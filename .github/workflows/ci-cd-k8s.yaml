name: CI/CD - Build and Deploy to Kubernetes

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/molam

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Molam ID image
        uses: docker/build-push-action@v5
        with:
          context: ./brique-102-molam-id
          file: ./brique-102-molam-id/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-id:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-id:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Notifications API image
        uses: docker/build-push-action@v5
        with:
          context: ./brique-144-notifications/backend
          file: ./brique-144-notifications/backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-notifications:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-notifications:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Translation API image
        uses: docker/build-push-action@v5
        with:
          context: ./brique-translation/backend
          file: ./brique-translation/backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-translation:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-translation:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Setup kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_STAGING_B64 }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBECONFIG_B64" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to staging
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/sa-rbac.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secrets-example.yaml
          kubectl apply -f k8s/deployment-molam-id.yaml
          kubectl apply -f k8s/deployment-notifications.yaml
          kubectl apply -f k8s/deployment-translation.yaml
          kubectl apply -f k8s/services.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/pdb.yaml
          kubectl apply -f k8s/network-policy.yaml

      - name: Update deployment images
        run: |
          kubectl -n molam set image deployment/molam-id molam-id=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-id:${{ github.sha }}
          kubectl -n molam set image deployment/molam-notifications-api notifications-api=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-notifications:${{ github.sha }}
          kubectl -n molam set image deployment/molam-translation-api translation-api=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-translation:${{ github.sha }}

      - name: Wait for rollout
        run: |
          kubectl -n molam rollout status deployment/molam-id --timeout=5m
          kubectl -n molam rollout status deployment/molam-notifications-api --timeout=5m
          kubectl -n molam rollout status deployment/molam-translation-api --timeout=5m

  deploy-production:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Setup kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_PROD_B64 }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBECONFIG_B64" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to production
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/sa-rbac.yaml
          kubectl apply -f k8s/configmap.yaml
          # Don't apply secrets-example in production - use ExternalSecrets/Vault
          kubectl apply -f k8s/deployment-molam-id.yaml
          kubectl apply -f k8s/deployment-notifications.yaml
          kubectl apply -f k8s/deployment-translation.yaml
          kubectl apply -f k8s/services.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/pdb.yaml
          kubectl apply -f k8s/network-policy.yaml

      - name: Update deployment images (canary rollout)
        run: |
          kubectl -n molam set image deployment/molam-id molam-id=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-id:${{ github.sha }}
          kubectl -n molam set image deployment/molam-notifications-api notifications-api=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-notifications:${{ github.sha }}
          kubectl -n molam set image deployment/molam-translation-api translation-api=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-translation:${{ github.sha }}

      - name: Wait for rollout
        run: |
          kubectl -n molam rollout status deployment/molam-id --timeout=10m
          kubectl -n molam rollout status deployment/molam-notifications-api --timeout=10m
          kubectl -n molam rollout status deployment/molam-translation-api --timeout=10m

      - name: Verify deployment health
        run: |
          kubectl -n molam get pods
          kubectl -n molam get ingress
          kubectl -n molam get hpa

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Production deployment successful"
          # Add Slack/Discord notification here
